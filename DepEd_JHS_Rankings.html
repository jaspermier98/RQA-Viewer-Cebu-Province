<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>DepEd CAR-RQA · JHS Teacher Rankings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2234;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #f59e0b;
    --green: #10b981;
    --text: #e2e8f0;
    --muted: #64748b;
    --rank-gold: #f59e0b;
    --rank-silver: #94a3b8;
    --rank-bronze: #cd7c45;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0f1c35 0%, #0a0e1a 60%);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 12px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .header-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .logo-badge {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    box-shadow: 0 0 20px rgba(59,130,246,0.3);
  }
  .header-title h1 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.3px;
    line-height: 1.1;
    background: linear-gradient(90deg, #e2e8f0, #93c5fd);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-title p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .stats-bar::-webkit-scrollbar { display: none; }
  .stat-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    white-space: nowrap;
    font-size: 11px;
    flex-shrink: 0;
  }
  .stat-chip .num {
    font-weight: 600;
    color: var(--accent);
  }

  /* FILTERS */
  .filters {
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .search-wrap {
    position: relative;
  }
  .search-wrap svg {
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    color: var(--muted); width: 16px; height: 16px; pointer-events: none;
  }
  input[type=search], select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 10px 12px;
    outline: none;
    transition: border-color 0.2s;
    appearance: none;
    -webkit-appearance: none;
  }
  input[type=search] { padding-left: 38px; }
  input[type=search]:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }
  .filter-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .select-wrap {
    position: relative;
  }
  .select-wrap::after {
    content: '▾';
    position: absolute;
    right: 11px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 11px;
    pointer-events: none;
  }

  /* RESULTS HEADER */
  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 12px;
  }
  .results-count {
    color: var(--muted);
  }
  .results-count span {
    color: var(--accent);
    font-weight: 600;
  }
  .sort-btn {
    background: none; border: none;
    color: var(--muted);
    font-size: 12px;
    cursor: pointer;
    padding: 4px 8px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .sort-btn:hover { background: var(--border); color: var(--text); }
  .sort-btn.active { color: var(--accent); }

  /* TABLE HEADER */
  .table-head {
    display: grid;
    grid-template-columns: 48px 1fr 80px 70px;
    gap: 0;
    padding: 8px 16px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    color: var(--muted);
    position: sticky;
    top: 0;
  }

  /* CARDS */
  #results-list {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .applicant-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .applicant-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--border);
    transition: background 0.15s;
  }
  .applicant-card:hover {
    border-color: rgba(59,130,246,0.4);
    background: var(--surface2);
    transform: translateX(2px);
  }
  .applicant-card:hover::before { background: var(--accent); }
  .applicant-card.rank-1::before { background: var(--rank-gold); }
  .applicant-card.rank-2::before { background: var(--rank-silver); }
  .applicant-card.rank-3::before { background: var(--rank-bronze); }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
  }
  .card-left {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    flex: 1;
    min-width: 0;
  }
  .rank-badge {
    width: 32px; height: 32px;
    border-radius: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
    color: var(--muted);
  }
  .rank-badge.gold { background: rgba(245,158,11,0.12); border-color: rgba(245,158,11,0.4); color: var(--rank-gold); }
  .rank-badge.silver { background: rgba(148,163,184,0.1); border-color: rgba(148,163,184,0.3); color: var(--rank-silver); }
  .rank-badge.bronze { background: rgba(205,124,69,0.1); border-color: rgba(205,124,69,0.3); color: var(--rank-bronze); }

  .card-info { flex: 1; min-width: 0; }
  .card-name {
    font-weight: 600;
    font-size: 13px;
    line-height: 1.3;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-top: 5px;
  }
  .tag {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    font-weight: 500;
    white-space: nowrap;
  }
  .tag-district {
    background: rgba(59,130,246,0.1);
    color: #60a5fa;
    border: 1px solid rgba(59,130,246,0.2);
  }
  .tag-subject {
    background: rgba(16,185,129,0.1);
    color: #34d399;
    border: 1px solid rgba(16,185,129,0.2);
  }
  .tag-spec {
    background: rgba(245,158,11,0.08);
    color: #fbbf24;
    border: 1px solid rgba(245,158,11,0.15);
  }

  .score-box {
    text-align: right;
    flex-shrink: 0;
  }
  .total-score {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 20px;
    line-height: 1;
    color: var(--text);
  }
  .score-label {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  /* EXPANDED DETAIL */
  .card-detail {
    display: none;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }
  .applicant-card.expanded .card-detail { display: block; }

  .score-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 8px;
  }
  .score-item {
    background: var(--surface2);
    border-radius: 8px;
    padding: 8px;
    text-align: center;
  }
  .score-item .val {
    font-weight: 600;
    font-size: 15px;
    color: var(--text);
  }
  .score-item .lbl {
    font-size: 9px;
    color: var(--muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .addr-line {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    padding: 6px 8px;
    background: var(--surface2);
    border-radius: 6px;
  }
  .addr-line span { color: var(--text); }

  /* EMPTY STATE */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* LOADING */
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }

  /* SUBJECT COLOR MAP */
  .subj-english { background: rgba(139,92,246,0.12); color: #a78bfa; border-color: rgba(139,92,246,0.25); }
  .subj-science { background: rgba(16,185,129,0.1); color: #34d399; border-color: rgba(16,185,129,0.2); }
  .subj-mathematics { background: rgba(59,130,246,0.1); color: #60a5fa; border-color: rgba(59,130,246,0.2); }
  .subj-tle { background: rgba(245,158,11,0.1); color: #fbbf24; border-color: rgba(245,158,11,0.2); }
  .subj-filipino { background: rgba(239,68,68,0.1); color: #f87171; border-color: rgba(239,68,68,0.2); }
  .subj-araling { background: rgba(251,191,36,0.1); color: #fcd34d; border-color: rgba(251,191,36,0.2); }
  .subj-mapeh { background: rgba(236,72,153,0.1); color: #f472b6; border-color: rgba(236,72,153,0.2); }
  .subj-esp { background: rgba(99,102,241,0.1); color: #818cf8; border-color: rgba(99,102,241,0.2); }

  /* BOTTOM PADDING FOR MOBILE */
  .bottom-pad { height: 40px; }

  /* SCROLLABLE LIST CONTAINER */
  #scroll-container {
    height: calc(100vh - var(--header-h, 180px));
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
</style>
</head>

let currentSort = 'rank';
let filtered = [];
let expandedIdx = null;

const subjectClass = {
  'English': 'subj-english',
  'Science': 'subj-science',
  'Mathematics': 'subj-mathematics',
  'TLE': 'subj-tle',
  'Filipino': 'subj-filipino',
  'Araling Panlipunan': 'subj-araling',
  'MAPEH': 'subj-mapeh',
  'ESP': 'subj-esp',
};

function rankClass(r) {
  if (r === 1) return 'gold';
  if (r === 2) return 'silver';
  if (r === 3) return 'bronze';
  return '';
}

function cardClass(r) {
  if (r === 1) return 'rank-1';
  if (r === 2) return 'rank-2';
  if (r === 3) return 'rank-3';
  return '';
}

function formatName(n) {
  // Convert from LASTNAME,FIRSTNAME to readable form
  return n.replace(/,/g, ', ').replace(/\s+/g, ' ').trim();
}

function renderCard(row, idx) {
  const rc = rankClass(row.rank);
  const sc = subjectClass[row.subject] || 'subj-english';
  const specTag = row.spec ? `<span class="tag tag-spec">${row.spec}</span>` : '';
  return `
  <div class="applicant-card ${cardClass(row.rank)}" id="card-${idx}" onclick="toggleCard(${idx})">
    <div class="card-top">
      <div class="card-left">
        <div class="rank-badge ${rc}">${row.rank}</div>
        <div class="card-info">
          <div class="card-name">${formatName(row.name)}</div>
          <div class="card-meta">
            <span class="tag tag-district">📍 ${row.district}</span>
            <span class="tag ${sc}">${row.subject}</span>
            ${specTag}
          </div>
        </div>
      </div>
      <div class="score-box">
        <div class="total-score">${row.total}</div>
        <div class="score-label">Total</div>
      </div>
    </div>
    <div class="card-detail">
      <div class="score-grid">
        <div class="score-item"><div class="val">${row.edu}</div><div class="lbl">Education</div></div>
        <div class="score-item"><div class="val">${row.train}</div><div class="lbl">Training</div></div>
        <div class="score-item"><div class="val">${row.exp}</div><div class="lbl">Experience</div></div>
        <div class="score-item"><div class="val">${row.let}</div><div class="lbl">LET Rating</div></div>
        <div class="score-item"><div class="val">${row.coi}</div><div class="lbl">PPST COIs</div></div>
        <div class="score-item"><div class="val">${row.ncoi}</div><div class="lbl">PPST NCOIs</div></div>
      </div>
      <div class="addr-line">📌 Address: <span>${row.address || '—'}</span></div>
    </div>
  </div>`;
}

function toggleCard(idx) {
  const card = document.getElementById('card-' + idx);
  if (!card) return;
  if (expandedIdx === idx) {
    card.classList.remove('expanded');
    expandedIdx = null;
  } else {
    if (expandedIdx !== null) {
      const prev = document.getElementById('card-' + expandedIdx);
      if (prev) prev.classList.remove('expanded');
    }
    card.classList.add('expanded');
    expandedIdx = idx;
  }
}

function setSort(type) {
  currentSort = type;
  document.getElementById('sort-rank').classList.toggle('active', type === 'rank');
  document.getElementById('sort-score').classList.toggle('active', type === 'score');
  renderFiltered();
}

// Virtual rendering for performance
const PAGE_SIZE = 50;
let rendered = 0;

function renderFiltered() {
  const list = document.getElementById('results-list');
  document.getElementById('count-display').textContent = filtered.length;
  document.getElementById('stat-total').textContent = filtered.length;
  expandedIdx = null;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>No applicants found.<br>Try adjusting your filters.</p></div>`;
    return;
  }

  const sorted = [...filtered].sort((a, b) => {
    if (currentSort === 'score') return parseFloat(b.total) - parseFloat(a.total);
    return a.rank - b.rank;
  });

  rendered = Math.min(PAGE_SIZE, sorted.length);
  list.innerHTML = sorted.slice(0, rendered).map((row, i) => renderCard(row, i)).join('');

  // Lazy load more on scroll
  list._sorted = sorted;
}

function loadMore() {
  const list = document.getElementById('results-list');
  if (!list._sorted) return;
  const sorted = list._sorted;
  if (rendered >= sorted.length) return;
  const next = Math.min(rendered + PAGE_SIZE, sorted.length);
  const frag = document.createElement('div');
  frag.innerHTML = sorted.slice(rendered, next).map((row, i) => renderCard(row, rendered + i)).join('');
  while (frag.firstChild) list.appendChild(frag.firstChild);
  rendered = next;
}

// Scroll detection for lazy load
document.getElementById('scroll-container').addEventListener('scroll', function() {
  if (this.scrollTop + this.clientHeight > this.scrollHeight - 200) loadMore();
}, { passive: true });

function applyFilters() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const subj = document.getElementById('filter-subject').value;
  const dist = document.getElementById('filter-district').value;

  filtered = RAW.filter(row => {
    if (subj && row.subject !== subj) return false;
    if (dist && row.district !== dist) return false;
    if (q) {
      const name = row.name.toLowerCase();
      const addr = row.address.toLowerCase();
      if (!name.includes(q) && !addr.includes(q)) return false;
    }
    return true;
  });

  renderFiltered();
}

// Debounced search
let searchTimer;
document.getElementById('search').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(applyFilters, 200);
});
document.getElementById('filter-subject').addEventListener('change', applyFilters);
document.getElementById('filter-district').addEventListener('change', applyFilters);

// Init
document.addEventListener('DOMContentLoaded', () => {
  filtered = RAW;
  renderFiltered();
});
</script>
